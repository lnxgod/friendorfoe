name: ESP32 Web Flasher

on:
  push:
    branches: [main]
    paths:
      - 'esp32/**'
      - '.github/workflows/esp32-web-flasher.yml'
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: esp32-web-flasher
  cancel-in-progress: true

jobs:
  # ── Build firmware ──────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('esp32/scanner/platformio.ini', 'esp32/uplink/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Build Scanner firmware (ESP32-S3)
        run: cd esp32/scanner && pio run -e scanner

      - name: Build WiFi Scanner firmware (ESP32)
        run: cd esp32/scanner && pio run -e scanner-esp32

      - name: Build Scanner firmware (ESP32-C5)
        run: cd esp32/scanner && pio run -e scanner-c5

      - name: Build BLE Scanner firmware (ESP32-S3)
        run: cd esp32/ble-scanner && pio run -e ble-scanner-s3

      - name: Build Uplink firmware (ESP32-C3)
        run: cd esp32/uplink && pio run

      - name: Package firmware binaries
        run: |
          mkdir -p firmware/scanner firmware/scanner-esp32 firmware/scanner-c5 firmware/ble-scanner firmware/uplink

          cp esp32/scanner/.pio/build/scanner/bootloader.bin firmware/scanner/
          cp esp32/scanner/.pio/build/scanner/partitions.bin firmware/scanner/partition-table.bin
          cp esp32/scanner/.pio/build/scanner/firmware.bin   firmware/scanner/

          cp esp32/scanner/.pio/build/scanner-esp32/bootloader.bin firmware/scanner-esp32/
          cp esp32/scanner/.pio/build/scanner-esp32/partitions.bin firmware/scanner-esp32/partition-table.bin
          cp esp32/scanner/.pio/build/scanner-esp32/firmware.bin   firmware/scanner-esp32/

          cp esp32/scanner/.pio/build/scanner-c5/bootloader.bin firmware/scanner-c5/
          cp esp32/scanner/.pio/build/scanner-c5/partitions.bin firmware/scanner-c5/partition-table.bin
          cp esp32/scanner/.pio/build/scanner-c5/firmware.bin   firmware/scanner-c5/

          cp esp32/ble-scanner/.pio/build/ble-scanner-s3/bootloader.bin firmware/ble-scanner/
          cp esp32/ble-scanner/.pio/build/ble-scanner-s3/partitions.bin firmware/ble-scanner/partition-table.bin
          cp esp32/ble-scanner/.pio/build/ble-scanner-s3/firmware.bin   firmware/ble-scanner/

          cp esp32/uplink/.pio/build/uplink/bootloader.bin firmware/uplink/
          cp esp32/uplink/.pio/build/uplink/partitions.bin firmware/uplink/partition-table.bin
          cp esp32/uplink/.pio/build/uplink/firmware.bin   firmware/uplink/

          echo "=== Firmware sizes ==="
          find firmware -name '*.bin' -exec ls -lh {} \;

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp32-firmware
          path: firmware/
          retention-days: 90

      - name: Attach firmware to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ github.event.release.tag_name }}
          cd firmware/scanner        && tar czf /tmp/scanner-firmware-${TAG}.tar.gz *.bin && cd -
          cd firmware/scanner-esp32  && tar czf /tmp/scanner-esp32-firmware-${TAG}.tar.gz *.bin && cd -
          cd firmware/scanner-c5     && tar czf /tmp/scanner-c5-firmware-${TAG}.tar.gz *.bin && cd -
          cd firmware/ble-scanner    && tar czf /tmp/ble-scanner-firmware-${TAG}.tar.gz *.bin && cd -
          cd firmware/uplink         && tar czf /tmp/uplink-firmware-${TAG}.tar.gz *.bin && cd -
          gh release upload "$TAG" \
            /tmp/scanner-firmware-${TAG}.tar.gz \
            /tmp/scanner-esp32-firmware-${TAG}.tar.gz \
            /tmp/ble-scanner-firmware-${TAG}.tar.gz \
            /tmp/scanner-c5-firmware-${TAG}.tar.gz \
            /tmp/uplink-firmware-${TAG}.tar.gz \
            --clobber

  # ── Deploy web flasher to GitHub Pages ──────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build
    # Deploy even if build failed — page will show but flash won't work yet
    if: always()
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Assemble site
        run: |
          mkdir -p _site/firmware/scanner _site/firmware/scanner-esp32 _site/firmware/scanner-c5 _site/firmware/ble-scanner _site/firmware/uplink

          # Web flasher page + manifests
          cp esp32/web-flasher/index.html                    _site/
          cp esp32/web-flasher/manifest-scanner.json          _site/
          cp esp32/web-flasher/manifest-scanner-esp32.json    _site/
          cp esp32/web-flasher/manifest-scanner-c5.json       _site/
          cp esp32/web-flasher/manifest-ble-scanner.json      _site/
          cp esp32/web-flasher/manifest-uplink.json           _site/

      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: esp32-firmware
          path: _site/firmware/
        continue-on-error: true

      - name: Verify site contents
        run: |
          echo "=== Pages site ==="
          find _site -type f -exec ls -lh {} \;

          if [ -f _site/firmware/scanner/firmware.bin ]; then
            echo "Scanner S3 firmware: OK"
          else
            echo "Scanner S3 firmware: MISSING (build may have failed)"
          fi

          if [ -f _site/firmware/scanner-esp32/firmware.bin ]; then
            echo "WiFi Scanner ESP32 firmware: OK"
          else
            echo "WiFi Scanner ESP32 firmware: MISSING (build may have failed)"
          fi

          if [ -f _site/firmware/scanner-c5/firmware.bin ]; then
            echo "Scanner C5 firmware: OK"
          else
            echo "Scanner C5 firmware: MISSING (build may have failed)"
          fi

          if [ -f _site/firmware/ble-scanner/firmware.bin ]; then
            echo "BLE Scanner firmware: OK"
          else
            echo "BLE Scanner firmware: MISSING (build may have failed)"
          fi

          if [ -f _site/firmware/uplink/firmware.bin ]; then
            echo "Uplink firmware: OK"
          else
            echo "Uplink firmware: MISSING (build may have failed)"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
