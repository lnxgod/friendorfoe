name: ESP32 Web Flasher

on:
  push:
    branches: [main]
    paths:
      - 'esp32/**'
      - '.github/workflows/esp32-web-flasher.yml'
  pull_request:
    branches: [main]
    paths:
      - 'esp32/**'
      - '.github/workflows/esp32-web-flasher.yml'
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: esp32-web-flasher
  cancel-in-progress: true

jobs:
  # ── Build firmware ──────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('esp32/platformio.ini', 'esp32/scanner/platformio.ini', 'esp32/uplink/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Create wifi_credentials.h from template (CI builds with defaults)
        run: cp esp32/uplink/main/core/wifi_credentials.h.example esp32/uplink/main/core/wifi_credentials.h

      - name: Run native ESP32 unit tests
        run: cd esp32 && pio test -e test

      - name: Build Scanner firmware (ESP32-S3 combo)
        run: cd esp32/scanner && pio run -e scanner-s3-combo

      - name: Build Scanner firmware (ESP32-S3 combo seed)
        run: cd esp32/scanner && pio run -e scanner-s3-combo-seed

      - name: Build Uplink firmware (ESP32-S3)
        run: cd esp32/uplink && pio run -e uplink-s3

      - name: Package firmware binaries
        run: |
          mkdir -p firmware/scanner firmware/scanner-seed firmware/uplink-s3

          cp esp32/scanner/.pio/build/scanner-s3-combo/bootloader.bin firmware/scanner/
          cp esp32/scanner/.pio/build/scanner-s3-combo/partitions.bin firmware/scanner/partition-table.bin
          cp esp32/scanner/.pio/build/scanner-s3-combo/firmware.bin   firmware/scanner/

          cp esp32/scanner/.pio/build/scanner-s3-combo-seed/bootloader.bin firmware/scanner-seed/
          cp esp32/scanner/.pio/build/scanner-s3-combo-seed/partitions.bin firmware/scanner-seed/partition-table.bin
          cp esp32/scanner/.pio/build/scanner-s3-combo-seed/firmware.bin   firmware/scanner-seed/

          cp esp32/uplink/.pio/build/uplink-s3/bootloader.bin firmware/uplink-s3/
          cp esp32/uplink/.pio/build/uplink-s3/partitions.bin firmware/uplink-s3/partition-table.bin
          cp esp32/uplink/.pio/build/uplink-s3/firmware.bin   firmware/uplink-s3/

          echo "=== Firmware sizes ==="
          find firmware -name '*.bin' -exec ls -lh {} \;

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp32-firmware
          path: firmware/
          retention-days: 90

      - name: Attach firmware to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ github.event.release.tag_name }}
          cp firmware/scanner/firmware.bin      /tmp/scanner-s3-combo-${TAG}.bin
          cp firmware/scanner-seed/firmware.bin /tmp/scanner-s3-combo-seed-${TAG}.bin
          cp firmware/uplink-s3/firmware.bin    /tmp/uplink-s3-${TAG}.bin
          cd firmware/scanner        && tar czf /tmp/scanner-firmware-${TAG}.tar.gz *.bin && cd -
          cd firmware/scanner-seed   && tar czf /tmp/scanner-seed-firmware-${TAG}.tar.gz *.bin && cd -
          cd firmware/uplink-s3      && tar czf /tmp/uplink-s3-firmware-${TAG}.tar.gz *.bin && cd -
          gh release upload "$TAG" \
            /tmp/scanner-s3-combo-${TAG}.bin \
            /tmp/scanner-s3-combo-seed-${TAG}.bin \
            /tmp/uplink-s3-${TAG}.bin \
            /tmp/scanner-firmware-${TAG}.tar.gz \
            /tmp/scanner-seed-firmware-${TAG}.tar.gz \
            /tmp/uplink-s3-firmware-${TAG}.tar.gz \
            --clobber

  # ── Deploy web flasher to GitHub Pages ──────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build
    # Deploy even if build failed — page will show but flash won't work yet
    if: always()
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Assemble site
        run: |
          mkdir -p _site/firmware/scanner _site/firmware/scanner-seed _site/firmware/uplink-s3

          # Web flasher page + manifests
          cp esp32/web-flasher/index.html                    _site/
          cp esp32/web-flasher/manifest-scanner.json          _site/
          cp esp32/web-flasher/manifest-scanner-seed.json     _site/
          cp esp32/web-flasher/manifest-uplink-s3.json        _site/

      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: esp32-firmware
          path: _site/firmware/
        continue-on-error: true

      - name: Verify site contents
        run: |
          echo "=== Pages site ==="
          find _site -type f -exec ls -lh {} \;

          if [ -f _site/firmware/scanner/firmware.bin ]; then
            echo "Scanner S3 firmware: OK"
          else
            echo "Scanner S3 firmware: MISSING (build may have failed)"
          fi

          if [ -f _site/firmware/scanner-seed/firmware.bin ]; then
            echo "Scanner S3 seed firmware: OK"
          else
            echo "Scanner S3 seed firmware: MISSING (build may have failed)"
          fi

          if [ -f _site/firmware/uplink-s3/firmware.bin ]; then
            echo "Uplink S3 firmware: OK"
          else
            echo "Uplink S3 firmware: MISSING (build may have failed)"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
