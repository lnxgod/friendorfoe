; Friend or Foe — Scanner Firmware (ESP32-S3)
; BLE Remote ID + WiFi promiscuous drone detection

[platformio]
src_dir = main

[env:scanner-s3-combo]
; Combined BLE + WiFi promiscuous on one S3 board — N16R8 production hardware.
; 16 MB flash partition table with 3 MB OTA slots for future classifier/ML growth.
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 921600
board_upload.flash_size = 16MB
board_build.partitions = partitions_s3_scanner_16mb.csv
board_build.cmake_extra_args = -DSDKCONFIG_DEFAULTS="sdkconfig.scanner-s3.defaults"
build_flags =
    -DSCANNER_BOARD
    -DBOARD_HAS_PSRAM
    -DSCANNER_S3_COMBO=1

[env:scanner-s3-combo-seed]
; Seed/mini carrier variant of scanner-s3-combo. Same S3 chip, same
; firmware code, but the seed carrier PCB only brings out GPIO 1/2 for
; UART to the uplink (instead of the N16R8's 17/18) and has 8 MB flash
; (vs 16). Everything else is identical to scanner-s3-combo — same
; Bayesian detection, same staged-handshake OTA, same PSRAM usage.
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 921600
board_upload.flash_size = 8MB
board_build.partitions = partitions_s3_scanner_8mb.csv
board_build.cmake_extra_args = -DSDKCONFIG_DEFAULTS="sdkconfig.scanner-s3-seed.defaults"
build_flags =
    -DSCANNER_BOARD
    -DBOARD_HAS_PSRAM
    -DSCANNER_S3_COMBO=1
    -DSEED_SCANNER_PINS

[env:scanner-s3-combo-fof_badge]
; FoF Badge scanner variant. Uses Seeed Studio XIAO ESP32S3 / ESP32-S3R8 hardware
; (8 MB flash, 8 MB PSRAM) and scanner UART pins TX=GPIO1, RX=GPIO2.
platform = espressif32
board = seeed_xiao_esp32s3
framework = espidf
monitor_speed = 921600
board_upload.flash_size = 8MB
board_build.partitions = partitions_s3_scanner_8mb.csv
board_build.cmake_extra_args = -DSDKCONFIG_DEFAULTS="sdkconfig.scanner-s3-fof_badge.defaults"
build_flags =
    -DSCANNER_BOARD
    -DBOARD_HAS_PSRAM
    -DSCANNER_S3_COMBO=1
    -DFOF_BADGE_VARIANT
    -DFOF_BADGE_SCANNER_PINS
