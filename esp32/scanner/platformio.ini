; Friend or Foe — Scanner Firmware (ESP32-S3)
; BLE Remote ID + WiFi promiscuous drone detection

[platformio]
src_dir = main

[env:scanner]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 921600
board_build.partitions = partitions.csv
build_flags =
    -DSCANNER_BOARD
    -DBOARD_HAS_PSRAM
