; Friend or Foe — Scanner Firmware (ESP32-S3)
; BLE Remote ID + WiFi promiscuous drone detection

[platformio]
src_dir = main

[env:scanner-s3-legacy]
; Legacy S3 BLE-only scanner — GPIO17(TX)/GPIO16(RX) for ESP32 OLED uplink nodes
; BLE-only to avoid overwhelming plain ESP32 uplinks with combo BLE+WiFi data
; Uplink expects: UART2 RX=D16, TX=D17
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 921600
board_build.partitions = partitions_ota.csv
board_build.cmake_extra_args = -DSDKCONFIG_DEFAULTS="sdkconfig.scanner-s3.defaults"
build_flags =
    -DSCANNER_BOARD
    -DBOARD_HAS_PSRAM
    -DBLE_SCANNER_ONLY
    -DLEGACY_SCANNER_PINS

[env:scanner-s3-combo]
; Combined BLE + WiFi promiscuous on one S3 board
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 921600
board_build.partitions = partitions_ota.csv
board_build.cmake_extra_args = -DSDKCONFIG_DEFAULTS="sdkconfig.scanner-s3.defaults"
build_flags =
    -DSCANNER_BOARD
    -DBOARD_HAS_PSRAM

[env:scanner-s3-wifi]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 921600
board_build.partitions = partitions_ota.csv
board_build.cmake_extra_args = -DWIFI_SCANNER_ONLY=1
build_flags =
    -DSCANNER_BOARD
    -DBOARD_HAS_PSRAM
    -DWIFI_SCANNER_ONLY

[env:scanner-esp32]
platform = espressif32
board = esp32dev
framework = espidf
monitor_speed = 115200
board_build.partitions = partitions_ota.csv
board_build.cmake_extra_args = -DWIFI_SCANNER_ONLY=1 -DSDKCONFIG_DEFAULTS="sdkconfig.esp32.defaults"
build_flags =
    -DSCANNER_BOARD
    -DWIFI_SCANNER_ONLY


[env:scanner-c5]
platform = https://github.com/pioarduino/platform-espressif32.git
board = esp32-c5-devkitc-1
framework = espidf
monitor_speed = 921600
board_build.partitions = partitions_ota.csv
board_build.cmake_extra_args = -DSDKCONFIG_DEFAULTS="sdkconfig.c5.defaults"
build_flags =
    -DSCANNER_BOARD
    -DWIFI_SCANNER_ONLY
    -DCONFIG_SCANNER_5GHZ_ENABLED
