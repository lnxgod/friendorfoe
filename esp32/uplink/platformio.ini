; Friend or Foe — Uplink Firmware
; WiFi STA + HTTP upload to backend + OLED status

[platformio]
src_dir = main

[env:uplink]
platform = espressif32
board = esp32-c3-devkitm-1
framework = espidf
monitor_speed = 921600
board_build.partitions = partitions_ota.csv
build_flags =
    -DUPLINK_BOARD

[env:uplink-esp32]
platform = espressif32
board = esp32dev
framework = espidf
monitor_speed = 921600
board_build.partitions = partitions_ota.csv
board_build.cmake_extra_args = -DSDKCONFIG_DEFAULTS="sdkconfig.esp32.defaults"
build_flags =
    -DUPLINK_BOARD
    -DUPLINK_ESP32

[env:uplink-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 921600
board_build.partitions = partitions_ota.csv
board_build.cmake_extra_args = -DSDKCONFIG_DEFAULTS="sdkconfig.esp32s3.defaults"
build_flags =
    -DUPLINK_BOARD
    -DUPLINK_ESP32S3
