; Friend or Foe — Uplink Firmware
; WiFi STA + HTTP upload to backend + OLED status

[platformio]
src_dir = main

[env:uplink-s3]
; Production S3 uplink — N16R8 hardware (16 MB flash, 8 MB octal PSRAM).
; Separate 16 MB partition table with 2 MB OTA slots and per-scanner-variant
; firmware-cache partitions (see partitions_s3_16mb.csv).
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 921600
board_upload.flash_size = 16MB
board_build.partitions = partitions_s3_16mb.csv
board_build.cmake_extra_args = -DSDKCONFIG_DEFAULTS="sdkconfig.esp32s3.defaults"
build_flags =
    -DUPLINK_BOARD
    -DUPLINK_ESP32S3
    -DBOARD_HAS_PSRAM

[env:uplink-s3-fof_badge]
; FoF Badge uplink variant. Uses Seeed Studio XIAO ESP32S3 / ESP32-S3R8 hardware
; (8 MB flash, 8 MB PSRAM) with dual scanner UARTs on GPIO1-4.
platform = espressif32
board = seeed_xiao_esp32s3
framework = espidf
monitor_speed = 921600
board_upload.flash_size = 8MB
board_build.partitions = partitions_s3_fof_badge_8mb.csv
board_build.cmake_extra_args = -DSDKCONFIG_DEFAULTS="sdkconfig.esp32s3-fof_badge.defaults"
build_flags =
    -DUPLINK_BOARD
    -DUPLINK_ESP32S3
    -DBOARD_HAS_PSRAM
    -DFOF_BADGE_VARIANT
