; Friend or Foe — Uplink Firmware
; WiFi STA + HTTP upload to backend + OLED status

[platformio]
src_dir = main

[env:uplink]
platform = espressif32
board = esp32-c3-devkitm-1
framework = espidf
monitor_speed = 921600
board_build.partitions = partitions.csv
build_flags =
    -DUPLINK_BOARD

[env:uplink-esp32]
platform = espressif32
board = esp32dev
framework = espidf
monitor_speed = 921600
board_build.partitions = partitions.csv
board_build.cmake_extra_args = -DSDKCONFIG_DEFAULTS="sdkconfig.esp32.defaults"
build_flags =
    -DUPLINK_BOARD
    -DUPLINK_ESP32
    -DCONFIG_DEVICE_ID=\"uplink_2\"
