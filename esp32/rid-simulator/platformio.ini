; Friend or Foe — BLE Remote ID Simulator
; Broadcasts ASTM F3411-compliant OpenDroneID advertisements for testing

[platformio]
src_dir = main

[env:rid-sim-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 115200
board_build.partitions = partitions.csv
build_flags =
    -DRID_SIMULATOR_BOARD
    -DBOARD_HAS_PSRAM

[env:rid-sim-c5]
platform = https://github.com/pioarduino/platform-espressif32.git
board = esp32-c5-devkitc-1
framework = espidf
monitor_speed = 115200
board_build.partitions = partitions.csv
board_build.cmake_extra_args = -DSDKCONFIG_DEFAULTS="sdkconfig.c5.defaults"
build_flags =
    -DRID_SIMULATOR_BOARD

[env:rid-sim-c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = espidf
monitor_speed = 115200
board_build.partitions = partitions.csv
board_build.cmake_extra_args = -DSDKCONFIG_DEFAULTS="sdkconfig.c3.defaults"
build_flags =
    -DRID_SIMULATOR_BOARD

[env:rid-sim-esp32]
platform = espressif32
board = esp32dev
framework = espidf
monitor_speed = 115200
board_build.partitions = partitions.csv
board_build.cmake_extra_args = -DSDKCONFIG_DEFAULTS="sdkconfig.esp32.defaults"
build_flags =
    -DRID_SIMULATOR_BOARD
