; Friend or Foe — BLE Scanner Firmware
; Dedicated BLE Remote ID (OpenDroneID) drone detection

[platformio]
src_dir = main

[env:ble-scanner-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 115200
board_build.partitions = partitions.csv
build_flags =
    -DBLE_SCANNER_BOARD
    -DBOARD_HAS_PSRAM

[env:ble-scanner-c5]
platform = https://github.com/pioarduino/platform-espressif32.git
board = esp32-c5-devkitc-1
framework = espidf
monitor_speed = 115200
board_build.partitions = partitions.csv
board_build.cmake_extra_args = -DSDKCONFIG_DEFAULTS="sdkconfig.c5.defaults"
build_flags =
    -DBLE_SCANNER_BOARD

[env:ble-scanner-c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = espidf
monitor_speed = 115200
board_build.partitions = partitions.csv
board_build.cmake_extra_args = -DSDKCONFIG_DEFAULTS="sdkconfig.c3.defaults"
build_flags =
    -DBLE_SCANNER_BOARD
