; Friend or Foe — Unit Tests (native)
; Scanner and Uplink have their own platformio.ini in their subdirectories.

[platformio]
src_dir = .
test_dir = test

[env:test]
platform = native
test_framework = unity
test_build_src = yes
extra_scripts =
    pre:test/link_math.py
build_flags =
    -Ishared
    -Iscanner/main/detection
    -Iscanner/main/core
    -Iuplink/main/network
    -Itest/stubs
    -DUNITY_INCLUDE_DOUBLE
    -DUNIT_TESTING
    -DSCANNER_ROLLBACK_HOST_TEST
    -DFW_AUTO_CHECK_HOST_TEST
build_src_filter =
    +<shared/detection_policy.c>
    +<shared/badge_display_policy.c>
    +<shared/badge_theme.c>
    +<shared/badge_button_gesture.c>
    +<shared/badge_threat_policy.c>
    +<shared/badge_runtime_policy.c>
    +<shared/time_sync_policy.c>
    +<scanner/main/detection/open_drone_id_parser.c>
    +<scanner/main/detection/dji_drone_id_parser.c>
    +<scanner/main/detection/wifi_ssid_patterns.c>
    +<scanner/main/detection/wifi_oui_database.c>
    +<scanner/main/detection/bayesian_fusion.c>
    +<scanner/main/detection/french_dri_parser.c>
    +<scanner/main/detection/ble_fingerprint.c>
    +<scanner/main/core/scanner_rollback.c>
    +<uplink/main/network/fw_auto_check.c>
