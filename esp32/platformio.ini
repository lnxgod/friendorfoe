; Friend or Foe — Unit Tests (native)
; Scanner and Uplink have their own platformio.ini in their subdirectories.

[env:test]
platform = native
test_framework = unity
test_dir = test
build_flags =
    -Ishared
    -Iscanner/main/detection
    -Itest/stubs
    -DUNITY_INCLUDE_DOUBLE
    -DUNIT_TESTING
build_src_filter =
    +<scanner/main/detection/open_drone_id_parser.c>
    +<scanner/main/detection/dji_drone_id_parser.c>
    +<scanner/main/detection/wifi_ssid_patterns.c>
    +<scanner/main/detection/wifi_oui_database.c>
    +<scanner/main/detection/bayesian_fusion.c>
    +<scanner/main/detection/french_dri_parser.c>
